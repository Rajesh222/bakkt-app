services:
  bakkt-mock:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bakkt-mock
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
